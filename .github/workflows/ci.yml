name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

# Minimal permissions for a read-only CI gate
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript (ESLint)
        # --quiet: only errors fail CI; warnings are reported but don't block.
        # Stories were not linted previously so pre-existing warnings are allowed.
        # The flat config is in eslint.config.js (required by ESLint v10+).
        run: npm run lint:js

      - name: Lint SCSS (Stylelint)
        # .stylelintrc.json defaultSeverity: "warning" means violations are
        # warnings. Errors (exit 2) would still block CI.
        run: npm run lint:css

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Generate asset manifest
        run: npm run generate-manifest

      - name: Run smoke tests
        run: npm run smoke-test

      - name: Check bundle sizes
        run: npm run check-bundle-size

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: docs/
          retention-days: 7

  component-metadata:
    name: Generate Component Metadata
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Generate component metadata
        run: npm run generate-component-metadata

      - name: Upload component metadata
        uses: actions/upload-artifact@v4
        with:
          name: component-metadata
          path: docs/component-metadata.json
          retention-days: 7
